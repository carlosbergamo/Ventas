<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Ventas</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Syne:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0e11;
    --surface: #13151a;
    --surface2: #1a1d24;
    --border: rgba(255,255,255,0.07);
    --amber: #e8a030;
    --amber-dim: rgba(232,160,48,0.12);
    --text: #e8e6df;
    --muted: #6b6a65;
    --up: #4db87a;
    --down: #e05a5a;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  html, body { width: 100%; min-height: 100vh; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    padding: 0 28px 48px;
  }

  /* ── LOADER ─────────────────────────────────────── */
  #loader {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; z-index: 999;
  }

  .loader-ring {
    width: 40px; height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-text {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── ERROR ───────────────────────────────────────── */
  #error-state {
    display: none;
    padding: 80px 48px;
    text-align: center;
  }

  .error-title {
    font-family: var(--font-display);
    font-size: 48px;
    color: var(--down);
    margin-bottom: 12px;
  }

  .error-msg {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .retry-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 8px 18px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  .retry-btn:hover { border-color: var(--amber); color: var(--amber); }

  /* ── DASHBOARD ───────────────────────────────────── */
  #dashboard { display: none; }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 32px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .brand-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 2px;
  }

  .brand-title {
    font-family: var(--font-display);
    font-size: 38px;
    letter-spacing: 0.04em;
    line-height: 1;
    color: var(--text);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .pulse {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--up);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.75); }
  }

  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 5px 12px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  .refresh-btn:hover { border-color: var(--amber); color: var(--amber); }

  /* ── KPI STRIP ───────────────────────────────────── */
  .kpi-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px 20px 16px;
    position: relative;
    overflow: hidden;
  }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--amber);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }

  .kpi-card:hover::before { transform: scaleX(1); }

  .kpi-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .kpi-value {
    font-family: var(--font-display);
    font-size: 40px;
    line-height: 1;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  /* ── MAIN GRID ───────────────────────────────────── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 12px;
    margin-bottom: 12px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px 22px;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .panel-title {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .panel-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 3px 8px;
    background: var(--amber-dim);
    color: var(--amber);
    border-radius: 2px;
  }

  /* ── BOTTOM GRID ─────────────────────────────────── */
  .bottom-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }

  /* ── FUNNEL ──────────────────────────────────────── */
  .funnel-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .funnel-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    width: 82px;
    flex-shrink: 0;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  .funnel-bar-wrap {
    flex: 1;
    height: 5px;
    background: var(--surface2);
    border-radius: 1px;
    overflow: hidden;
  }

  .funnel-bar {
    height: 100%;
    background: var(--amber);
    border-radius: 1px;
    width: 0;
    transition: width 1s cubic-bezier(0.16,1,0.3,1);
  }

  .funnel-num {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text);
    width: 38px;
    text-align: right;
    flex-shrink: 0;
  }

  /* ── PRODUCTS ────────────────────────────────────── */
  .product-row {
    display: flex;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }

  .product-row:last-child { border-bottom: none; }

  .product-rank {
    font-family: var(--font-display);
    font-size: 20px;
    color: rgba(255,255,255,0.1);
    width: 26px;
    flex-shrink: 0;
    line-height: 1;
  }

  .product-rank.top { color: var(--amber); }

  .product-name {
    flex: 1;
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .product-rev {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text);
    font-weight: 500;
    flex-shrink: 0;
  }

  /* ── REGIONS ─────────────────────────────────────── */
  .region-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }

  .region-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .region-name { flex: 1; font-size: 12px; color: var(--text); }
  .region-pct  { font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
  .region-val  { font-family: var(--font-mono); font-size: 11px; color: var(--text); width: 60px; text-align: right; flex-shrink: 0; }

  /* ── RESPONSIVE ──────────────────────────────────── */
  @media (max-width: 900px) {
    .kpi-strip  { grid-template-columns: repeat(2, 1fr); }
    .main-grid  { grid-template-columns: 1fr; }
    .bottom-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-ring"></div>
  <span class="loader-text">Cargando datos del sheet…</span>
</div>

<!-- ERROR -->
<div id="error-state">
  <div class="error-title">ERROR</div>
  <p class="error-msg" id="error-msg">No se pudo conectar con el backend.</p>
  <button class="retry-btn" onclick="loadData()">↺ Reintentar</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <header>
    <div>
      <div class="brand-label">Panel de control</div>
      <h1 class="brand-title">VENTAS</h1>
    </div>
    <div class="header-right">
      <div class="live-badge">
        <div class="pulse"></div>
        <span id="last-updated">—</span>
      </div>
      <button class="refresh-btn" onclick="loadData()">↺ Actualizar</button>
    </div>
  </header>

  <!-- KPIs -->
  <div class="kpi-strip">
    <div class="kpi-card">
      <div class="kpi-label">Ingresos totales</div>
      <div class="kpi-value" id="kpi-ingresos">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Unidades vendidas</div>
      <div class="kpi-value" id="kpi-unidades">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Ticket promedio</div>
      <div class="kpi-value" id="kpi-ticket">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Tasa de conversión</div>
      <div class="kpi-value" id="kpi-conversion">—</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-grid">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Ingresos por mes</span>
        <span class="panel-badge" id="revenue-badge">—</span>
      </div>
      <div style="position:relative; width:100%; height:220px;">
        <canvas id="revenueChart"></canvas>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Embudo de ventas</span>
      </div>
      <div id="funnel-container"></div>
      <div style="margin-top:20px; padding-top:16px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
        <span style="font-family:var(--font-mono); font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.12em;">Tasa global</span>
        <span style="font-family:var(--font-display); font-size:30px; color:var(--amber);" id="conversion-rate">—</span>
      </div>
    </div>
  </div>

  <!-- BOTTOM -->
  <div class="bottom-grid">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Top productos</span>
      </div>
      <div id="products-container"></div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Por categoría</span>
      </div>
      <div style="position:relative; width:100%; height:170px;">
        <canvas id="donutChart"></canvas>
      </div>
      <div id="donut-legend" style="margin-top:14px; display:flex; flex-direction:column; gap:7px;"></div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Por región</span>
      </div>
      <div id="regions-container"></div>
    </div>
  </div>
</div>

<script>
(function() {

  // ═══════════════════════════════════════════════════
  //  ▼▼▼  ÚNICO VALOR QUE TENÉS QUE EDITAR  ▼▼▼
  // ═══════════════════════════════════════════════════
  var WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxDOwD5nFB0visE8Qz9ugLeqgXLBEDODMQ1bi490CPWHLMItzVDbFoRPVpLIipi6rNw/exec;
  // ═══════════════════════════════════════════════════

  var revenueChart = null;
  var donutChart   = null;
  var COLORS = ['#e8a030','#4db87a','#5b8fff','#b87de8','#e05a5a','#6b6a65'];

  // ── Fetch ──────────────────────────────────────────
  async function loadData() {
    showLoader();
    try {
      var res = await fetch(WEBAPP_URL, {
        method: 'GET',
        headers: { 'Content-Type': 'text/plain' }
      });

      if (!res.ok) throw new Error('HTTP ' + res.status);

      var d = await res.json();

      if (!d.success) throw new Error(d.error || 'Error en el backend.');

      renderDashboard(d);
      showPanel('dashboard');

    } catch (err) {
      document.getElementById('error-msg').textContent = err.message;
      showPanel('error');
    }
  }

  // ── UI state ───────────────────────────────────────
  function showLoader() {
    document.getElementById('loader').style.display    = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('error-state').style.display = 'none';
  }

  function showPanel(name) {
    document.getElementById('loader').style.display    = 'none';
    document.getElementById('dashboard').style.display = name === 'dashboard' ? 'block' : 'none';
    document.getElementById('error-state').style.display = name === 'error' ? 'block' : 'none';
  }

  // ── Render principal ───────────────────────────────
  function renderDashboard(d) {
    document.getElementById('last-updated').textContent =
      'ACTUALIZADO ' + d.lastUpdated.toUpperCase();

    document.getElementById('kpi-ingresos').textContent  = d.kpis.ingresos;
    document.getElementById('kpi-unidades').textContent  = Number(d.kpis.unidades).toLocaleString('es-AR');
    document.getElementById('kpi-ticket').textContent    = d.kpis.ticket;
    document.getElementById('kpi-conversion').textContent = d.kpis.conversion + '%';

    renderRevenueChart(d.revenue);
    renderFunnel(d.funnel, d.kpis.conversion);
    renderProducts(d.topProducts);
    renderDonut(d.categories);
    renderRegions(d.regions);
  }

  // ── Revenue chart ──────────────────────────────────
  function renderRevenueChart(rev) {
    if (revenueChart) revenueChart.destroy();
    if (!rev.labels.length) return;

    document.getElementById('revenue-badge').textContent =
      rev.labels[0] + ' — ' + rev.labels[rev.labels.length - 1];

    var ctx  = document.getElementById('revenueChart').getContext('2d');
    var grad = ctx.createLinearGradient(0, 0, 0, 220);
    grad.addColorStop(0, 'rgba(232,160,48,0.2)');
    grad.addColorStop(1, 'rgba(232,160,48,0)');

    revenueChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: rev.labels,
        datasets: [{
          data: rev.values,
          borderColor: '#e8a030',
          borderWidth: 2,
          pointRadius: rev.labels.length > 12 ? 0 : 3,
          pointHoverRadius: 4,
          pointBackgroundColor: '#e8a030',
          tension: 0.4,
          fill: true,
          backgroundColor: grad
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1a1d24',
            borderColor: 'rgba(255,255,255,0.08)',
            borderWidth: 1,
            titleColor: '#6b6a65',
            bodyColor: '#e8e6df',
            titleFont: { family: 'DM Mono', size: 10 },
            bodyFont: { family: 'Bebas Neue', size: 20 },
            callbacks: {
              label: function(ctx) {
                return ' $' + ctx.raw.toLocaleString('es-AR');
              }
            }
          }
        },
        scales: {
          x: {
            grid: { color: 'rgba(255,255,255,0.04)', drawTicks: false },
            ticks: { color: '#6b6a65', font: { family: 'DM Mono', size: 9 }, maxTicksLimit: 8, maxRotation: 0 },
            border: { display: false }
          },
          y: {
            grid: { color: 'rgba(255,255,255,0.04)', drawTicks: false },
            ticks: {
              color: '#6b6a65',
              font: { family: 'DM Mono', size: 9 },
              callback: function(v) { return '$' + (v >= 1000 ? Math.round(v/1000) + 'K' : v); }
            },
            border: { display: false }
          }
        }
      }
    });
  }

  // ── Funnel ─────────────────────────────────────────
  function renderFunnel(funnel, conversion) {
    var container = document.getElementById('funnel-container');
    container.innerHTML = '';
    document.getElementById('conversion-rate').textContent = conversion + '%';

    if (!funnel.length) return;

    var max = funnel[0].val || 1;

    funnel.forEach(function(step, i) {
      var pct   = Math.round((step.val / max) * 100);
      var barId = 'fbar-' + i;

      container.innerHTML +=
        '<div class="funnel-row">'
        + '<span class="funnel-label">' + step.label + '</span>'
        + '<div class="funnel-bar-wrap"><div class="funnel-bar" id="' + barId + '"></div></div>'
        + '<span class="funnel-num">' + step.val.toLocaleString('es-AR') + '</span>'
        + '</div>';

      setTimeout(function() {
        var el = document.getElementById(barId);
        if (el) el.style.width = pct + '%';
      }, 300 + i * 80);
    });
  }

  // ── Products ───────────────────────────────────────
  function renderProducts(products) {
    var container = document.getElementById('products-container');
    container.innerHTML = '';

    if (!products.length) {
      container.innerHTML = '<p style="font-family:var(--font-mono);font-size:11px;color:var(--muted);">Sin datos.</p>';
      return;
    }

    products.forEach(function(p, i) {
      container.innerHTML +=
        '<div class="product-row">'
        + '<span class="product-rank' + (i === 0 ? ' top' : '') + '">' + String(i+1).padStart(2,'0') + '</span>'
        + '<span class="product-name">' + p.name + '</span>'
        + '<span class="product-rev">' + p.rev + '</span>'
        + '</div>';
    });
  }

  // ── Donut ──────────────────────────────────────────
  function renderDonut(categories) {
    if (donutChart) donutChart.destroy();

    var legend = document.getElementById('donut-legend');
    legend.innerHTML = '';

    if (!categories.length) return;

    var colors = categories.map(function(_, i) { return COLORS[i % COLORS.length]; });

    donutChart = new Chart(document.getElementById('donutChart'), {
      type: 'doughnut',
      data: {
        labels: categories.map(function(c) { return c.name; }),
        datasets: [{
          data: categories.map(function(c) { return c.pct; }),
          backgroundColor: colors,
          borderColor: '#13151a',
          borderWidth: 3,
          hoverOffset: 4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '70%',
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1a1d24',
            borderColor: 'rgba(255,255,255,0.08)',
            borderWidth: 1,
            titleColor: '#6b6a65',
            bodyColor: '#e8e6df',
            titleFont: { family: 'DM Mono', size: 10 },
            bodyFont: { family: 'DM Mono', size: 12 },
            callbacks: { label: function(ctx) { return ' ' + ctx.label + ': ' + ctx.raw + '%'; } }
          }
        }
      }
    });

    categories.forEach(function(c, i) {
      legend.innerHTML +=
        '<div style="display:flex;align-items:center;gap:8px;justify-content:space-between;">'
        + '<div style="display:flex;align-items:center;gap:7px;">'
        + '<div style="width:7px;height:7px;border-radius:50%;background:' + colors[i] + ';flex-shrink:0;"></div>'
        + '<span style="font-size:11px;color:var(--text);">' + c.name + '</span>'
        + '</div>'
        + '<span style="font-family:var(--font-mono);font-size:11px;color:var(--muted);">' + c.pct + '%</span>'
        + '</div>';
    });
  }

  // ── Regions ────────────────────────────────────────
  function renderRegions(regions) {
    var container = document.getElementById('regions-container');
    container.innerHTML = '';

    if (!regions.length) {
      container.innerHTML = '<p style="font-family:var(--font-mono);font-size:11px;color:var(--muted);">Sin datos.</p>';
      return;
    }

    regions.forEach(function(r, i) {
      container.innerHTML +=
        '<div class="region-row">'
        + '<div class="region-dot" style="background:' + COLORS[i % COLORS.length] + '"></div>'
        + '<span class="region-name">' + r.name + '</span>'
        + '<span class="region-pct">' + r.pct + '%</span>'
        + '<span class="region-val">' + r.val + '</span>'
        + '</div>';
    });
  }

  // ── Init ───────────────────────────────────────────
  window.addEventListener('load', loadData);
  window.loadData = loadData;

})();
</script>
</body>
</html>
